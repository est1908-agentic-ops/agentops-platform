apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: engine
  namespace: argocd
spec:
  project: default
  sources:
    # repoURL must be the full OCI path to the chart artifact (…/agentic-ops/engine).
    # ArgoCD resolves the chart tag against repoURL directly and does NOT append the
    # `chart` field to it, so a bare …/agentic-ops resolves the wrong artifact and 404s.
    - repoURL: oci://gitactions.est1908.top/agentic-ops/engine
      chart: engine
      targetRevision: "0.0.0-ea3b33c121856a8f393d0c6d7725a305bf7dea31"
      helm:
        releaseName: engine
        valueFiles:
          - $values/clusters/ops/engine/values.yaml
    - repoURL: git@github.com:flair-hr/agentops-platform.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: dev-agents
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
