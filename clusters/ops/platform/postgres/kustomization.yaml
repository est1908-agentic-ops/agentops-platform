apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Plain PostgreSQL 16 (official image) instead of the Bitnami chart: Bitnami's
# 2025 repackaging removed free *versioned* container images and pruned old
# chart versions from charts.bitnami.com (only the newest chart remains, and it
# now points at a rolling `:latest` image). kustomize's helmCharts can't pull
# from the OCI registry that still has pinned charts either. A minimal
# StatefulSet on the official image is fully pinned and dependency-stable, and
# its initdb script creates temporal_visibility so there is no manual step.
resources:
  - service.yaml
  - statefulset.yaml
  - initdb-configmap.yaml
  # Sync-phase Job that ensures agentops_engine exists on an already-bootstrapped
  # cluster (initdb only covers fresh PGDATA). Renames legacy agent_run_stats on
  # existing clusters, then creates agentops_engine if still missing.
  - agent-stats-db-bootstrap-job.yaml
  - litellm-cleanup-job.yaml

# postgres-credentials Secret (KSOPS-decrypted). Consumed by both this
# StatefulSet (POSTGRES_PASSWORD) and Temporal (existingSecret).
generators:
  - secret-generator.yaml
