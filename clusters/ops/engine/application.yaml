apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: engine
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/flair-hr/agentops-engine.git
      targetRevision: dcf3d060900c83a830c6bd5eff7f760f902d7b5a
      path: charts/engine
      helm:
        releaseName: engine
        valueFiles:
          - $values/clusters/ops/engine/values.yaml
    - repoURL: https://github.com/flair-hr/agentops-platform.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: dev-agents
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
