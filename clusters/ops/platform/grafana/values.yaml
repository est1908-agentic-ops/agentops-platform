admin:
  existingSecret: grafana-credentials
  userKey: admin-user
  passwordKey: admin-password

persistence:
  enabled: true
  size: 5Gi

# Static datasources -- all three addresses are known at deploy time, no
# sidecar-watch mechanism needed (same "simplicity over machinery" call the
# Postgres component made over the Bitnami chart's extra moving parts).
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server.platform.svc.cluster.local
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.platform.svc.cluster.local:3100
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.platform.svc.cluster.local:3200

# Enabled now (with nothing to watch yet) so sub-project 4 can drop
# grafana_dashboard-labeled ConfigMaps later with no further Grafana redeploy.
sidecar:
  dashboards:
    enabled: true

# Internal grafana.lab host plus a public host. The public host gets a real
# Let's Encrypt cert via the letsencrypt ClusterIssuer (HTTP-01 through Traefik),
# same shape as temporal-web (clusters/ops/platform/temporal). Requires a public
# DNS A record grafana.agentic-ops.est1908.top -> 185.250.36.166 (DNS-provider
# side, not automated here). Grafana has its own admin login (grafana-credentials),
# so unlike Temporal Web this UI is authenticated.
ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - grafana.lab
    - grafana.agentic-ops.est1908.top
  tls:
    - secretName: grafana-tls
      hosts:
        - grafana.agentic-ops.est1908.top
