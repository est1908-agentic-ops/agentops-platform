apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    # Real, publicly-trusted certs for internet-facing hosts (the gateway's
    # webhook endpoint) — distinct from step-ca's internal-only ClusterIssuer,
    # which nothing outside this cluster trusts. HTTP-01 needs port 80
    # reachable from the internet on whichever host fronts Traefik; no DNS
    # provider API/credentials required (unlike a DNS-01 solver).
    server: https://acme-v02.api.letsencrypt.org/directory
    email: artem.kireev@flair.hr
    privateKeySecretRef:
      name: letsencrypt-acme-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
