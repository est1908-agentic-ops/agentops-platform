server:
  # The server image is temporalio/server:1.30.3. Temporal 1.30+ images use
  # built-in sprig templating and read the config from the path in
  # TEMPORAL_SERVER_CONFIG_FILE_PATH; the chart's default "dockerize" config
  # method targets <=1.29.x images and is silently ignored by 1.30.x, which then
  # falls back to its embedded (Cassandra-default) template and fails to boot
  # with "Persistence.DataStores[default].Cassandra.Hosts: zero value".
  # Use the sprig config ConfigMap and have the chart set the config-file path.
  configMapsToMount: "sprig"
  setConfigFilePath: true
  config:
    persistence:
      defaultStore: default
      default:
        driver: "sql"
        sql:
          driver: "postgres12"
          host: "postgres-postgresql.platform.svc.cluster.local"
          port: 5432
          database: "temporal"
          user: "temporal"
          existingSecret: "postgres-credentials"
      visibility:
        driver: "sql"
        sql:
          driver: "postgres12"
          host: "postgres-postgresql.platform.svc.cluster.local"
          port: 5432
          database: "temporal_visibility"
          user: "temporal"
          existingSecret: "postgres-credentials"

# No bundled datastores — we point at the Postgres component (Task 4) instead.
cassandra:
  enabled: false
mysql:
  enabled: false
elasticsearch:
  enabled: false

# LGTM/observability stack is M4+ (design doc non-goals) — don't let
# this chart's bundled monitoring subcharts jump ahead of that.
prometheus:
  enabled: false
grafana:
  enabled: false

web:
  ingress:
    enabled: true
    hosts:
      - "temporal.lab"
