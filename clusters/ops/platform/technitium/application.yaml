apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: technitium
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/est1908-agentic-ops/agentops-platform.git
    targetRevision: main
    path: clusters/ops/platform/technitium
    directory:
      recurse: false
      exclude: application.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: technitium
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
