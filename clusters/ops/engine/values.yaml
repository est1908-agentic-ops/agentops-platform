namespace: dev-agents

# image.workerTag / image.agentRunnerTag / image.gatewayTag / chart targetRevision
# are bumped automatically by agentops-engine CI on every merge to main (see that
# repo's scripts/bump-platform-engine-tags.sh). Do not edit the tag fields by hand
# unless overriding for a one-off deploy.
#
# agentClaudeTag was renamed to agentRunnerTag (2026-07-06): claude and pi now
# share one image (agentops-engine ARCHITECTURE.md §5.4) instead of one per
# backend — images/agent-claude/ no longer exists in that repo. Its value
# carries forward the last real agentClaudeTag bump, since it's the same
# underlying build. gatewayTag is new and has no prior bump to inherit, so it
# stays CHANGEME until the next agentops-engine CI run sets a real value.
image:
  repository: gitactions.est1908.top/agentic-ops
  workerTag: "ea3b33c121856a8f393d0c6d7725a305bf7dea31"
  agentRunnerTag: "ea3b33c121856a8f393d0c6d7725a305bf7dea31"
  gatewayTag: "ea3b33c121856a8f393d0c6d7725a305bf7dea31"
  pullPolicy: IfNotPresent

temporalAddress: "temporal-frontend.platform.svc.cluster.local:7233"

githubTokenSecretName: github-token
imagePullSecretName: registry-credentials
claudeAuthSecretName: claude-credentials
piAuthSecretName: pi-credentials

gateway:
  # Real public hostname for GitHub's webhook delivery — the letsencrypt
  # ClusterIssuer (clusters/ops/platform/letsencrypt) issues a real,
  # publicly-trusted cert for it via HTTP-01 through Traefik. Requires port 80
  # reachable from the internet on this host and a public DNS A/AAAA record
  # for agentic-ops.est1908.top pointed at it (not automated here — that's a
  # DNS-provider-side change outside this repo's scope, same as Technitium's
  # *.lab zone is separate from public DNS).
  ingress:
    enabled: true
    host: agentic-ops.est1908.top
    clusterIssuer: letsencrypt
