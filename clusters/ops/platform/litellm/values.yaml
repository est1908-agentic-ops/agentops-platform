# db-bootstrap-job.yaml creates this role/database before the chart's own
# migration Job (also PreSync) runs against them -- see that file and the
# design doc for why litellm gets its own role instead of reusing temporal's.
db:
  useExisting: true
  deployStandalone: false
  endpoint: postgres-postgresql.platform.svc.cluster.local
  database: litellm
  secret:
    name: litellm-db-credentials
    usernameKey: username
    passwordKey: password

# No caching/rate-limit-coordination need yet with a single replica -- YAGNI
# until a concrete reason shows up (see design doc non-goals).
redis:
  enabled: false

masterkeySecretName: litellm-credentials
masterkeySecretKey: masterkey

# Projects every key in both secrets as env vars named exactly like the key:
# LITELLM_SALT_KEY (litellm-credentials) and ZAI_API_KEY (litellm-provider-keys).
environmentSecrets:
  - litellm-credentials
  - litellm-provider-keys

# One model for now: z.ai's GLM, the first real LiteLLM consumer (M5 sub-project
# 2 in agentops-engine). `model_name` (not the `zai/glm-4.6` provider string) is
# the contract that sub-project calls this proxy with -- see design doc.
proxy_config:
  model_list:
    - model_name: zai-glm-4.6
      litellm_params:
        model: zai/glm-4.6
        api_key: os.environ/ZAI_API_KEY
  general_settings:
    master_key: os.environ/PROXY_MASTER_KEY

service:
  type: ClusterIP
  port: 4000

# Internal-only: no public host. The master key can mint/revoke every virtual
# key, a bigger blast radius than Temporal Web's read-mostly visibility, which
# is why that one got a public host and this one doesn't (see design doc).
ingress:
  enabled: true
  className: traefik
  hosts:
    - host: litellm.lab
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# litellm (proxy + prisma client) peaks around ~500Mi just during startup and gets
# OOMKilled at the old 512Mi limit (confirmed via cgroup oom-kill: anon-rss ~505MB
# before it even finished booting -> exit 137, no logs, port never opens). Give it
# real headroom; the node has ~24Gi so 1Gi is comfortable.
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    memory: 1Gi
