apiVersion: batch/v1
kind: Job
metadata:
  name: litellm-db-bootstrap
  namespace: platform
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    # One wave before the chart's own migration Job (also PreSync, default
    # wave "0" -- confirmed via `kustomize build --enable-helm`), which needs
    # the litellm role/database to exist before it can run Prisma migrations
    # against them.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 3
  template:
    metadata:
      name: litellm-db-bootstrap
    spec:
      restartPolicy: Never
      containers:
        - name: create-role-and-database
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: LITELLM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-db-credentials
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              # ON_ERROR_STOP=1 is essential: without it psql exits 0 even when a
              # statement errors, so this Job reported "Succeeded" while actually
              # doing nothing (the role/db were never created).
              psql -h postgres-postgresql.platform.svc.cluster.local -U temporal -d temporal \
                -v ON_ERROR_STOP=1 -v pw="$LITELLM_DB_PASSWORD" <<'SQL'
              -- Create the role if missing, then always realign its password to the
              -- secret (idempotent; also picks up a rotated password).
              --
              -- IMPORTANT: psql does NOT interpolate :'pw' inside a DO $$...$$
              -- dollar-quoted block, so the earlier DO-block version sent a literal
              -- ":'pw'" -> "syntax error at or near :" and never created the role.
              -- Do the interpolation in plain SQL (where psql substitutes it) and run
              -- the generated statement with \gexec instead.
              SELECT format('CREATE ROLE litellm WITH LOGIN PASSWORD %L', :'pw')
              WHERE NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'litellm')\gexec
              ALTER ROLE litellm WITH LOGIN PASSWORD :'pw';
              SELECT 'CREATE DATABASE litellm OWNER litellm'
              WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'litellm')\gexec
              SQL
