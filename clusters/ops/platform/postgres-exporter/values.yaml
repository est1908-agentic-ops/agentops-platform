# Connects directly to agent_run_stats rather than temporal/postgres: Postgres's
# pg_database catalog is instance-wide, so pg_database_size_bytes still covers
# every database on the shared instance regardless of which one this exporter
# is connected to -- but pg_stat_user_tables (row counts, dead tuples) is only
# exposed for the connected database's own tables. Connecting here gets both
# "how big is the whole instance" and "how big is agent_run_stats specifically"
# from one exporter, no custom queries file needed.
config:
  datasource:
    host: postgres-postgresql.platform.svc.cluster.local
    port: "5432"
    user: temporal
    passwordSecret:
      name: postgres-credentials
      key: password
    database: agent_run_stats
    sslmode: disable

# No Prometheus Operator/ServiceMonitor CRD installed in this stack (plain
# prometheus-community/prometheus chart) -- scraped via the same
# prometheus.io/scrape annotation convention every other component here uses.
# Port matches the exporter's real container port (9187), not the Service's
# own remapped port 80.
service:
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9187"
