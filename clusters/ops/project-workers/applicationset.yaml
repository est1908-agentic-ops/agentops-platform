apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: project-workers
  namespace: argocd
spec:
  goTemplate: true
  generators:
    # Repo-sourced (project-worker-onboarding SP-b): the worker spec is read
    # from each managed project's agents.json `worker` block by the engine
    # gateway, not a git-file list. See plugin-configmap.yaml. (The former
    # git-file generator over workers.yaml is fully superseded and that file
    # has been removed — broccoli's worker now lives in its agents.json.)
    - plugin:
        configMapRef:
          name: project-workers-plugin
        input:
          parameters: {}
        requeueAfterSeconds: 180
  template:
    metadata:
      name: 'project-worker-{{.project}}'
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: oci://gitactions.est1908.top/agentic-ops/project-worker
        chart: project-worker
        targetRevision: "0.0.0-8233c0690f6f12a449c36f95a249f3f2678617f5"
        helm:
          releaseName: '{{.project}}'
          # One templated `values` string, NOT valuesObject: ArgoCD does not
          # compose the two — when both are set, valuesObject silently wins
          # and everything in `values` is discarded (argoproj/argo-cd#21132),
          # which is how externalSecretRefs got dropped on first deploy.
          # externalSecretRefs arrives from the gateway as a JSON-encoded
          # string array (plugin params are string-valued); inlining it works
          # because JSON is valid YAML. The `if` guards a gateway that
          # predates the param (a missing key would render the literal string
          # "<no value>" and break the chart's list-typed value); the chart
          # default [] applies then.
          values: |
            project: {{ .project | quote }}
            image: {{ .image | quote }}
            taskQueue: {{ default "" .taskQueue | quote }}
            temporal:
              address: temporal-frontend.platform.svc.cluster.local:7233
              namespace: dev-agents
            otel:
              endpoint: http://alloy.platform.svc.cluster.local:4317
            {{- if .externalSecretRefs }}
            externalSecretRefs: {{ .externalSecretRefs }}
            {{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: dev-agents
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true