server:
  # The server image is temporalio/server:1.30.3. Temporal 1.30+ images use
  # built-in sprig templating and read the config from the path in
  # TEMPORAL_SERVER_CONFIG_FILE_PATH; the chart's default "dockerize" config
  # method targets <=1.29.x images and is silently ignored by 1.30.x, which then
  # falls back to its embedded (Cassandra-default) template and fails to boot
  # with "Persistence.DataStores[default].Cassandra.Hosts: zero value".
  # Use the sprig config ConfigMap and have the chart set the config-file path.
  configMapsToMount: "sprig"
  setConfigFilePath: true
  config:
    persistence:
      defaultStore: default
      default:
        driver: "sql"
        sql:
          driver: "postgres12"
          host: "postgres-postgresql.platform.svc.cluster.local"
          port: 5432
          database: "temporal"
          user: "temporal"
          existingSecret: "postgres-credentials"
      visibility:
        driver: "sql"
        sql:
          driver: "postgres12"
          host: "postgres-postgresql.platform.svc.cluster.local"
          port: 5432
          database: "temporal_visibility"
          user: "temporal"
          existingSecret: "postgres-credentials"

# No bundled datastores — we point at the Postgres component (Task 4) instead.
cassandra:
  enabled: false
mysql:
  enabled: false
elasticsearch:
  enabled: false

# LGTM/observability stack is M4+ (design doc non-goals) — don't let
# this chart's bundled monitoring subcharts jump ahead of that.
prometheus:
  enabled: false
grafana:
  enabled: false

web:
  ingress:
    enabled: true
    className: traefik
    # Public host gets a real Let's Encrypt cert via the letsencrypt ClusterIssuer
    # (HTTP-01 through Traefik). Requires a public DNS A record for
    # temporal.agentic-ops.est1908.top -> the cluster's ingress IP
    # (185.250.36.166), created on the DNS provider side (not automated here —
    # same as agentic-ops.est1908.top).
    #
    # NOTE: the Temporal Web UI has NO authentication. This host is intentionally
    # exposed to the public internet with no auth (per ops decision 2026-07-06):
    # anyone reachable can view workflow inputs/outputs and terminate workflows.
    # Put a Traefik auth middleware in front of it if that ever needs locking down.
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
    hosts:
      - "temporal.lab"
      - "temporal.agentic-ops.est1908.top"
    tls:
      - secretName: temporal-web-tls
        hosts:
          - "temporal.agentic-ops.est1908.top"
