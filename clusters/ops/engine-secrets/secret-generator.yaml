apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: engine-secrets-generator
files:
  - ../../../secrets/model-tokens/pi-credentials.enc.yaml
  - ../../../secrets/gateway/gateway-webhook-secret.enc.yaml
  - ../../../secrets/forge/github-token-broccoli.enc.yaml
  # The worker's ENGINE_DB_PASSWORD client reads from a postgres-credentials
  # Secret in its own namespace (dev-agents); without it the worker Deployment can't start (CreateContainerConfigError -> the whole
  # shared fleet crash-loops). This is the SAME encrypted file the platform
  # postgres app decrypts into the platform namespace -- one source of truth for
  # the `temporal` superuser password. Its metadata.namespace is pinned to
  # `platform`, so kustomization.yaml's `namespace: dev-agents` retargets this
  # copy into dev-agents (verified: the namespace transformer overrides a
  # preset namespace and applies to ksops generator output).
  - ../../../secrets/postgres/postgres-credentials.enc.yaml
  # Same cross-namespace pattern as postgres-credentials above: the worker's
  # LiteLLM backend reads LITELLM_API_KEY from a litellm-credentials Secret in
  # its own namespace (dev-agents). This is the SAME encrypted file the
  # platform litellm app decrypts into the platform namespace (masterkey +
  # LITELLM_SALT_KEY) -- one source of truth for the proxy's master key. Its
  # metadata.namespace is pinned to `platform`; kustomization.yaml's
  # `namespace: dev-agents` retargets this copy the same way it does for
  # postgres-credentials.
  - ../../../secrets/litellm/litellm-credentials.enc.yaml
  # Decrypts tokens in managed_projects (agentops-engine managed-project
  # registry data layer). Mounted as PROJECT_CREDENTIAL_PRIVATE_KEY in worker
  # and gateway once the pinned engine chart includes the value (PR #7).
  - ../../../secrets/engine/project-credential-key.enc.yaml
  # Real Claude Pro/Max subscription OAuth token (claudeAuthSecretName in
  # values.yaml already pointed at this secret name — the file just didn't
  # exist yet). Injected as CLAUDE_CODE_OAUTH_TOKEN via the engine chart's
  # whole-secret envFrom wiring into the claude backend's Job/Deployment
  # pods (packages/backends/src/k8s/k8s-job-runner.ts in agentops-engine).
  - ../../../secrets/model-tokens/claude-credentials.enc.yaml
  # Add one line per additional engine-consumed secret as it's SOPS-encrypted
  # (per-project github-token-<product> forge secrets — see
  # docs/superpowers/specs/2026-07-06-forge-project-secrets-design.md).
