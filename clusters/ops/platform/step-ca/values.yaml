# step-ca (smallstep/step-certificates) Helm values. Standalone CA with an
# ACME provisioner so cert-manager can request certs from it exactly like it
# would from a public ACME CA.
#
# The chart bootstraps the CA with `step ca init`, which creates ONLY the
# default JWK `admin` provisioner. Adding the ACME provisioner via
# `inject.config.files.ca.json` does not work in this deployment: that path is
# consumed only when `inject.enabled: true`, and even then it *replaces* the
# whole autogenerated ca.json (root/key/db/tls paths and all) rather than
# merging. In bootstrap mode the supported hook is `ca.bootstrap.postInitHook`,
# a script snippet the bootstrap job runs after `step ca init` and before it
# writes ca.json into the ConfigMap, so the ACME provisioner lands in the
# persisted config. Provisioner name `acme` matches the ClusterIssuer's ACME
# directory URL (…/acme/acme/directory).
ca:
  bootstrap:
    postInitHook: |
      step ca provisioner add acme --type ACME
