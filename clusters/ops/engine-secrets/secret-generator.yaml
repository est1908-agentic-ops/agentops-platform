apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: engine-secrets-generator
files:
  - ../../../secrets/model-tokens/pi-credentials.enc.yaml
  - ../../../secrets/gateway/gateway-webhook-secret.enc.yaml
  # The worker's ENGINE_DB_PASSWORD client reads from a postgres-credentials
  # Secret in its own namespace (dev-agents); without it the worker Deployment can't start (CreateContainerConfigError -> the whole
  # shared fleet crash-loops). This is the SAME encrypted file the platform
  # postgres app decrypts into the platform namespace -- one source of truth for
  # the `temporal` superuser password. Its metadata.namespace is pinned to
  # `platform`, so kustomization.yaml's `namespace: dev-agents` retargets this
  # copy into dev-agents (verified: the namespace transformer overrides a
  # preset namespace and applies to ksops generator output).
  - ../../../secrets/postgres/postgres-credentials.enc.yaml
  # Decrypts tokens in managed_projects (agentops-engine managed-project
  # registry data layer). Mounted as PROJECT_CREDENTIAL_PRIVATE_KEY in worker
  # and gateway once the pinned engine chart includes the value (PR #7).
  - ../../../secrets/engine/project-credential-key.enc.yaml
  # Real Claude Pro/Max subscription OAuth token (claudeAuthSecretName in
  # values.yaml already pointed at this secret name — the file just didn't
  # exist yet). Injected as CLAUDE_CODE_OAUTH_TOKEN via the engine chart's
  # whole-secret envFrom wiring into the claude backend's Job/Deployment
  # pods (packages/backends/src/k8s/k8s-job-runner.ts in agentops-engine).
  - ../../../secrets/model-tokens/claude-credentials.enc.yaml
  # Operator bearer token gating control's /api/projects CRUD routes
  # (agentops-engine PR #11, X-Control-Crud-Token header). Mounted as
  # CONTROL_CRUD_TOKEN in the control Deployment once the pinned engine
  # chart's projectCrudTokenSecretName value points at this secret name.
  - ../../../secrets/engine/control-crud-token.enc.yaml
  # Bearer token the gateway's ArgoCD project-workers plugin-generator route
  # (POST /api/v1/getparams.execute) checks. Mounted as ARGOCD_PLUGIN_TOKEN in
  # the gateway Deployment via gateway.argocdPluginTokenSecretName. The SAME
  # token value must exist as a Secret in the argocd namespace for the plugin
  # ConfigMap to send (see clusters/ops/project-workers/plugin-configmap.yaml
  # + the PR's runbook). project-worker-onboarding spec §5.2/§6.2.
  - ../../../secrets/engine/argocd-plugin-token.enc.yaml
  # TEMPORAL_HOST/GRAFANA_HOST/GRAFANA_USER/GRAFANA_PASSWORD for the platform
  # role's Job (agentops-engine platform-ops skill's toolbelt). Mounted via
  # platformAgentSecretName's envFrom wiring (packages/worker/src/main.ts
  # buildBackends). GRAFANA_USER/PASSWORD are the same admin credential as
  # secrets/grafana/grafana-credentials.enc.yaml — a fresh file rather than
  # reusing that one directly because its admin-user/admin-password keys
  # aren't valid C-identifiers and envFrom silently drops non-identifier
  # secret keys, so `admin-user` would never actually reach the Job's env.
  - ../../../secrets/engine/platform-agent-credentials.enc.yaml
  # Read-only GitHub PAT (Contents+Issues) for the PRIVATE est1908/agents repo,
  # mounted into artem-private-agents-worker via agents.json
  # worker.externalSecrets -> the project-worker chart's externalSecretRefs
  # envFrom (project-worker-onboarding spec §6.1). A project-OWNED external,
  # not an engine credential — the first real use of the forge/ per-project
  # secret pattern. Its fetchProductContext activity fetches
  # raw.githubusercontent.com + the issues API, which 404 unauthenticated on
  # a private repo.
  - ../../../secrets/forge/agents-github-token.enc.yaml
  # Add one line per additional engine-consumed secret as it's SOPS-encrypted
  # (per-project github-token-<product> forge secrets — see
  # docs/superpowers/specs/2026-07-06-forge-project-secrets-design.md).
