apiVersion: batch/v1
kind: Job
metadata:
  name: agent-stats-db-bootstrap
  namespace: platform
  annotations:
    # initdb-configmap.yaml's 20-agentops-engine.sql only runs on a *fresh*
    # PGDATA, so agentops_engine is missing on any cluster that was bootstrapped
    # before that script landed (or still has the legacy agent_run_stats name).
    # Without the database the engine worker's ensureSchema() crash-loops at
    # startup. This Job renames the legacy database on existing clusters and
    # creates agentops_engine idempotently, alongside the other database hooks.
    #
    # This is a NORMAL (Sync-phase) resource, deliberately NOT an argocd hook.
    # A hook is invisible to ArgoCD's live-vs-desired diff, so adding one to an
    # already-Synced app produces no diff, auto-sync never launches a sync
    # operation, and the hook never fires (exactly what happened when the first
    # version of this Job shipped as a PostSync hook — it was defined but never
    # ran, and the worker kept crashing on "agent_run_stats does not exist").
    # As a tracked resource its creation IS a diff, so merging it forces the
    # sync that runs it. Ordering is safe within the Sync phase: ArgoCD applies
    # Secret (postgres-credentials) before Job by kind, and the StatefulSet is
    # already healthy.
    #
    # Replace=true: a completed Job's pod template is immutable, so if this
    # manifest ever changes ArgoCD must delete+recreate rather than patch.
    argocd.argoproj.io/sync-options: Replace=true
spec:
  backoffLimit: 3
  template:
    metadata:
      name: agent-stats-db-bootstrap
    spec:
      restartPolicy: Never
      containers:
        - name: create-database
          image: postgres:16-alpine
          env:
            # postgres-credentials holds the `temporal` superuser password
            # (POSTGRES_USER=temporal in statefulset.yaml). The engine worker
            # connects to agentops_engine as that same `temporal` user, so
            # creating the database as temporal makes temporal its owner and no
            # extra role/grant is needed.
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              HOST=postgres-postgresql.platform.svc.cluster.local
              USER=temporal
              DB=temporal

              has_db() {
                psql -h "$HOST" -U "$USER" -d "$DB" -tAc "SELECT 1 FROM pg_database WHERE datname='$1'" | grep -q 1
              }

              # One-time rename from the M4 sub-project 3 name. ALTER DATABASE
              # cannot run inside a transaction, so shell branching is required.
              if has_db agent_run_stats && ! has_db agentops_engine; then
                psql -h "$HOST" -U "$USER" -d "$DB" -v ON_ERROR_STOP=1 \
                  -c "ALTER DATABASE agent_run_stats RENAME TO agentops_engine;"
              fi

              # Idempotent create for fresh installs / clusters already renamed.
              if ! has_db agentops_engine; then
                psql -h "$HOST" -U "$USER" -d "$DB" -v ON_ERROR_STOP=1 <<'SQL'
              SELECT 'CREATE DATABASE agentops_engine'
              WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'agentops_engine')\gexec
              SQL
              fi
