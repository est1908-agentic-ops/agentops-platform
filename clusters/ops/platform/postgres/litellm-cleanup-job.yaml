apiVersion: batch/v1
kind: Job
metadata:
  name: litellm-cleanup
  namespace: platform
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: cleanup
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              psql -h postgres-postgresql.platform.svc.cluster.local -U temporal -d temporal -v ON_ERROR_STOP=1 <<'SQL'
              SELECT pg_terminate_backend(pid)
              FROM pg_stat_activity
              WHERE datname = 'litellm' AND pid <> pg_backend_pid();
              SELECT 'DROP DATABASE litellm'
              WHERE EXISTS (SELECT FROM pg_database WHERE datname = 'litellm')\gexec
              SELECT 'DROP ROLE litellm'
              WHERE EXISTS (SELECT FROM pg_roles WHERE rolname = 'litellm')\gexec
              SQL
