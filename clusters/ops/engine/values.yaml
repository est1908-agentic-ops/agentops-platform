namespace: dev-agents

# image.workerTag / image.agentClaudeTag / chart targetRevision are bumped
# automatically by agentops-engine CI on every merge to main (see that repo's
# scripts/bump-platform-engine-tags.sh). Do not edit the tag fields by hand
# unless overriding for a one-off deploy.
image:
  repository: ghcr.io/flair-hr/agentops-engine
  workerTag: CHANGEME
  agentClaudeTag: CHANGEME
  pullPolicy: IfNotPresent

temporalAddress: "temporal-frontend.platform.svc.cluster.local:7233"

githubTokenSecretName: github-token
