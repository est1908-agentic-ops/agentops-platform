apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: engine-secrets
  namespace: argocd
  annotations:
    # Reconcile before the engine Application so worker/gateway Pods never
    # race a Secret that doesn't exist yet on a fresh sync.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/flair-hr/agentops-platform.git
    targetRevision: main
    path: clusters/ops/engine-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: dev-agents
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
