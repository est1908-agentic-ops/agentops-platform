apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: step-ca
spec:
  acme:
    # The step-certificates Service exposes 443 -> pod's 9000; use the Service port (443), not the pod port.
    server: https://step-certificates.step-ca.svc.cluster.local/acme/acme/directory
    skipTLSVerify: true # step-ca's own cert isn't yet trusted by cert-manager's ACME client; revisit once cert-manager trusts step-ca's root
    privateKeySecretRef:
      name: step-ca-acme-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
