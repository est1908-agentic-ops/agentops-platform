namespace: dev-agents

# image.workerTag / image.agentRunnerTag / image.gatewayTag / image.controlTag /
# chart targetRevision are bumped automatically by agentops-engine CI on every
# merge to main (see that repo's scripts/bump-platform-engine-tags.sh). Do not
# edit the tag fields by hand unless overriding for a one-off deploy.
#
# agentClaudeTag was renamed to agentRunnerTag (2026-07-06): claude and pi now
# share one image (agentops-engine ARCHITECTURE.md §5.4) instead of one per
# backend — images/agent-claude/ no longer exists in that repo. Its value
# carries forward the last real agentClaudeTag bump, since it's the same
# underlying build. gatewayTag is new and has no prior bump to inherit, so it
# stays CHANGEME until the next agentops-engine CI run sets a real value.
image:
  repository: gitactions.est1908.top/agentic-ops
  workerTag: "8233c0690f6f12a449c36f95a249f3f2678617f5"
  agentRunnerTag: "8233c0690f6f12a449c36f95a249f3f2678617f5"
  gatewayTag: "8233c0690f6f12a449c36f95a249f3f2678617f5"
  # Platform console (agentops-engine PR #25). Pinned to the merge commit until
  # the next engine CI bump lands; re-run engine main CI if the image is missing.
  controlTag: "8233c0690f6f12a449c36f95a249f3f2678617f5"
  pullPolicy: IfNotPresent

temporalAddress: "temporal-frontend.platform.svc.cluster.local:7233"

# Temporal Web UI base URL for "Open in Temporal" links in the platform console.
temporalUiBaseUrl: "https://temporal.agentic-ops.est1908.top"

# Secret name for the platform role's Job credentials (TEMPORAL_HOST,
# GRAFANA_HOST, GRAFANA_USER, GRAFANA_PASSWORD), mounted via envFrom
# (packages/worker/src/main.ts buildBackends). See
# secrets/engine/platform-agent-credentials.enc.yaml + this repo's
# engine-secrets generator.
platformAgentSecretName: platform-agent-credentials

# M4 sub-project 2 (agentops-engine): OTel spans export to Alloy's OTLP
# endpoint, deployed in M4 sub-project 1. See that repo's
# docs/superpowers/specs/2026-07-07-otel-instrumentation-design.md.
otelExporterOtlpEndpoint: "http://alloy.platform.svc.cluster.local:4317"

# M4 sub-project 3 (agentops-engine): agentops_engine database holds run
# stats and managed_projects (see agentops-engine
# docs/superpowers/specs/2026-07-08-managed-project-registry-design.md).
# port/name/user/passwordSecretName all already match the engine chart's
# defaults -- only the host needs setting here.
#
# The agentops_engine database MUST exist on the live cluster before the
# next engine chart bump lands (auto-bumped by agentops-engine CI,
# unattended) -- the worker calls ensureSchema() against this host at
# startup and crash-loops if the database doesn't exist yet. initdb only
# creates it on a fresh bootstrap, not on this already-running cluster;
# the postgres bootstrap Job renames agent_run_stats -> agentops_engine on
# existing clusters (see DEPLOY.md Phase 9). Same hazard class as the
# github-token/projects warning below.
engineDb:
  host: "postgres-postgresql.platform.svc.cluster.local"

# Managed-project credential decryption (agentops-engine PR #7). Worker and
# gateway mount the X25519 private key (PROJECT_CREDENTIAL_PRIVATE_KEY) to
# decrypt project tokens; control gets only the matching public key below.
projectCredentialPrivateKeySecretName: project-credential-key

# X25519 public key (base64 SPKI-DER) control uses to encrypt project tokens on
# write — the encrypt-only half of the keypair whose private key is in
# secrets/engine/project-credential-key.enc.yaml. NOT a secret, so it's a plain
# value. Without it control can't build the managed-project store and
# /api/projects returns "project CRUD is disabled" (503). Derived from the
# deployed private key, so it's guaranteed to match.
projectCredentialPublicKey: "MCowBQYDK2VuAyEAAuidf7MeAA2Q0X6n8zQ/ug7mH0htTFwL8F6i8Uyxtig="

# Operator bearer token gating control's /api/projects CRUD routes
# (agentops-engine PR #11). Sent as X-Control-Crud-Token, not Authorization,
# to avoid colliding with Traefik basic-auth on the control ingress. Matching
# secret added in the same merge (secrets/engine/control-crud-token.enc.yaml +
# engine-secrets/secret-generator.yaml) — without both, this stays inert and
# the routes 503.
projectCrudTokenSecretName: control-crud-token

githubTokenSecretName: github-token
imagePullSecretName: registry-credentials
claudeAuthSecretName: claude-credentials
piAuthSecretName: pi-credentials

# Provider-rate-limit fallback (agentops-engine
# docs/superpowers/specs/2026-07-08-provider-rate-limit-fallback-design.md):
# retries once against this model on a real 429 from the primary model. Both
# models route through the `pi` CLI's own provider support, so this needs no
# new backend wiring -- just OPENROUTER_API_KEY, already present in the
# pi-credentials secret (see secrets/model-tokens/pi-credentials.enc.yaml).
piRateLimitFallbackModel: "openrouter/deepseek-v4-pro"

gateway:
  # Enables the ArgoCD project-workers plugin-generator route on the gateway
  # (POST /api/v1/getparams.execute). Points at the Secret the engine-secrets
  # ksops generator produces from secrets/engine/argocd-plugin-token.enc.yaml
  # (key ARGOCD_PLUGIN_TOKEN). Consumed by the project-workers ApplicationSet
  # via clusters/ops/project-workers/plugin-configmap.yaml.
  argocdPluginTokenSecretName: argocd-plugin-token
  # Real public hostname for GitHub's webhook delivery — the letsencrypt
  # ClusterIssuer (clusters/ops/platform/letsencrypt) issues a real,
  # publicly-trusted cert for it via HTTP-01 through Traefik. Requires port 80
  # reachable from the internet on this host and a public DNS A/AAAA record
  # for agentic-ops.est1908.top pointed at it (not automated here — that's a
  # DNS-provider-side change outside this repo's scope, same as Technitium's
  # *.lab zone is separate from public DNS).
  ingress:
    enabled: true
    host: agentic-ops.est1908.top
    clusterIssuer: letsencrypt
  # Same startup profile as control below (both are the console-era tsx build):
  # the chart default (500m / 256Mi) crash-loops the new image. Kept in step
  # with control.resources.
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 512Mi

control:
  # Platform console — Vite SPA + control BFF served from one pod (port 3001).
  # Public DNS A record console.agentic-ops.est1908.top -> 185.250.36.166
  # (same ingress IP as agentic-ops.est1908.top / temporal.agentic-ops.est1908.top).
  ingress:
    enabled: true
    host: console.agentic-ops.est1908.top
    clusterIssuer: letsencrypt
  # The console build (agentops-engine PR #25, image 5f0b60ff) bundles a Vite
  # SPA into the control image, so tsx cold-start now needs ~350Mi+ and ~25s to
  # bind /healthz. The chart's 256Mi limit OOMKills it on startup, and its
  # hardcoded probes (no startupProbe / initialDelaySeconds — restart at ~30s)
  # kill it before it can serve; both effects together crash-loop the pod and
  # take Control fully down (Traefik 503). Raising memory stops the OOM and the
  # extra CPU gets the cold start inside the liveness window. Verified
  # end-to-end on-cluster: at 256Mi/500m the pod OOMKills; with the values below
  # it reaches Ready with 0 restarts. Proper durable fix is a startupProbe in
  # the engine chart (that repo isn't reachable from here); until then, do not
  # lower these back to the chart defaults.
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 512Mi
