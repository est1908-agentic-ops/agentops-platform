# Two jobs (ARCHITECTURE.md §5.4/§5.6): receive OTLP traces from instrumented
# workers/agent-runner Jobs and forward to Tempo; tail dev-agents' and
# platform's pod container logs and forward to Loki (scope rationale is on
# discovery.kubernetes below). The chart doesn't expose ports for whatever
# components the config below defines -- extraPorts does that.
alloy:
  configMap:
    content: |
      otelcol.receiver.otlp "default" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {
          endpoint = "0.0.0.0:4318"
        }

        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.platform.svc.cluster.local:4317"
          tls {
            insecure = true
          }
        }
      }

      // Scoped to the two namespaces that actually need log collection.
      // Unscoped discovery watches every pod cluster-wide (argocd,
      // cert-manager, temporal, postgres, ...), which inflates the number of
      // concurrent tailers loki.source.kubernetes holds open. That component
      // has a known fd/inotify-instance leak under high pod churn
      // (grafana/alloy#1217) -- dev-agents spawns one ephemeral Job pod per
      // runAgent call, so narrowing scope here reduces how fast that leak
      // reaches the node's inotify instance ceiling (see bootstrap.sh's
      // tune_kernel_params for the other half of this mitigation: raising
      // that ceiling).
      discovery.kubernetes "pods" {
        role = "pod"
        namespaces {
          names = ["dev-agents", "platform"]
        }
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki.platform.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
