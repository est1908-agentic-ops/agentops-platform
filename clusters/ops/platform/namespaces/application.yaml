apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:flair-hr/agentops-platform.git
    targetRevision: main
    path: clusters/ops/platform/namespaces
    directory:
      recurse: false
      exclude: application.yaml
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
