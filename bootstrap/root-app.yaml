# ArgoCD app-of-apps entrypoint. Applied once by bootstrap.sh;
# afterwards ArgoCD manages everything, including itself.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "git@github.com:flair-hr/agentops-platform.git"
    targetRevision: main
    path: clusters/ops
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
