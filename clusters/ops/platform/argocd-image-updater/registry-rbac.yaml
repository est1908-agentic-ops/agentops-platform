# Image Updater runs in the argocd namespace but reads the engine's pull secret
# (registry-credentials) from dev-agents via `pullsecret:dev-agents/registry-credentials`.
# Grant its ServiceAccount get on exactly that secret.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: image-updater-read-registry-creds
  namespace: dev-agents
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["registry-credentials"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: image-updater-read-registry-creds
  namespace: dev-agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: image-updater-read-registry-creds
subjects:
  - kind: ServiceAccount
    name: argocd-image-updater
    namespace: argocd
